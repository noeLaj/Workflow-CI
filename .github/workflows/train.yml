name: MLflow CI

on:
  push:
    branches: [ main ]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install MLflow + dependencies
      run: |
        pip install mlflow scikit-learn pandas numpy

    - name: Run MLflow Project
      run: mlflow run MLProject
