name: Train Model

on:
  push:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install mlflow pandas scikit-learn

      - run: |
          cd MLProject
          python modelling.py
